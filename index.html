<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Versatile AI</title>
    <!--link rel="stylesheet" href="style.css"-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda@3.4.1/eruda.min.js"></script>
    <script>eruda.init();</script>
</head>
<body>
    <!-- ==========================================
         HEADER
    ========================================== -->
    <div id="header" class="hidden">
        <span id="limit-info">Лимит: 0/0</span>
        <span id="chat-model-indicator">Versatile AI</span>
        <div id="header-navigation">
            <button class="action-btn" onclick="window.profileUI.openModalTab('chats')" title="Диалоги">
                <i data-lucide="message-square"></i>
            </button>
            <button class="action-btn" onclick="window.profileUI.openModalTab('favorites')" title="Избранное">
                <i data-lucide="star"></i>
            </button>
            <button class="action-btn" onclick="window.profileUI.openModalTab('organizer')" title="Органайзер">
                <i data-lucide="calendar"></i>
            </button>
            <button class="action-btn" onclick="window.themeManager.toggleTheme()" title="Сменить тему">
                <i data-lucide="sun" id="theme-icon"></i>
            </button>
            <div id="user-profile-trigger" onclick="window.profileUI.openModalTab('profile')">
                <img id="user-avatar" src="" alt="Avatar">
            </div>
        </div>
    </div>

    <!-- ==========================================
         PROFILE CARD (Модальное окно)
    ========================================== -->
    <div id="profile-card" class="hidden">
        <div class="profile-content">
            <div class="profile-scrollable-zone">
                <!-- TAB: Профиль -->
                <div id="tab-profile" class="modal-tab hidden">
                    <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: var(--app-spacing-lg);">
                        <img id="card-avatar" src="" alt="Avatar Large" style="width: 64px; height: 64px; border-radius: var(--app-radius-full); margin-bottom: var(--app-spacing-sm); border: 3px solid var(--app-accent-primary); object-fit: cover;">
                        <div id="user-name" style="font-weight: 700; font-size: var(--app-font-size-xl); color: var(--app-text-primary);">Пользователь</div>
                    </div>
                    
                    <!-- Выбор темы -->
                    <div style="margin-top: var(--app-spacing-md); border-top: 1px solid var(--app-border-color); padding-top: var(--app-spacing-lg);">
                        <p style="font-size: var(--app-font-size-sm); font-weight: 600; color: var(--app-text-secondary); margin-bottom: var(--app-spacing-md);">🎨 Выберите тему</p>
                        <div style="display: flex; gap: var(--app-spacing-sm); flex-wrap: wrap;">
                            <button class="theme-selector-btn" data-theme-btn="light" onclick="window.themeManager.setTheme('light')">
                                <i data-lucide="sun"></i> Светлая
                            </button>
                            <button class="theme-selector-btn" data-theme-btn="dark" onclick="window.themeManager.setTheme('dark')">
                                <i data-lucide="moon"></i> Темная
                            </button>
                            <button class="theme-selector-btn" data-theme-btn="amoled" onclick="window.themeManager.setTheme('amoled')">
                                <i data-lucide="monitor"></i> AMOLED
                            </button>
                        </div>
                    </div>
                </div>

                <!-- TAB: Чаты -->
                <div id="tab-chats" class="modal-tab hidden">
                    <div class="modal-sticky-header">
                        <p id="dialogs-label">💬 Ваши диалоги:</p>
                        <div style="display: flex; gap: var(--app-spacing-sm);">
                            <button id="new-chat-btn" class="btn" style="padding: 6px 14px; font-size: var(--app-font-size-sm); border-radius: var(--app-radius-sm);" onclick="window.chatUI.createNewChat()">
                                <i data-lucide="plus"></i> Новый
                            </button>
                            <button class="btn" style="padding: 6px 14px; font-size: var(--app-font-size-sm); border-radius: var(--app-radius-sm); background: rgba(231,76,60,0.1); color: var(--app-accent-danger); display: flex; align-items: center; gap: var(--app-spacing-xs);" onclick="window.openTrashModal()">
                                <i data-lucide="trash-2"></i>
                                <span id="trash-count" style="font-size: var(--app-font-size-xs); background: var(--app-accent-danger); color: white; border-radius: var(--app-radius-full); padding: 1px 6px; min-width: 18px; text-align: center; display: none;">0</span>
                            </button>
                        </div>
                    </div>
                    <div id="chat-filters">
                        <button class="filter-chip active" data-topic="all" onclick="window.profileUI.applyChatFilter('all')">Все</button>
                        <button class="filter-chip" data-topic="code" onclick="window.profileUI.applyChatFilter('code')">#кодинг</button>
                        <button class="filter-chip" data-topic="creative" onclick="window.profileUI.applyChatFilter('creative')">#креатив</button>
                        <button class="filter-chip" data-topic="fast" onclick="window.profileUI.applyChatFilter('fast')">#флуд</button>
                        <button class="filter-chip" data-topic="kitchen" onclick="window.profileUI.applyChatFilter('kitchen')">#кухня</button>
                        <button class="filter-chip" data-topic="analytics" onclick="window.profileUI.applyChatFilter('analytics')">#аналитика</button>
                    </div>
                    <div id="history-chats-list"></div>
                </div>

                <!-- TAB: Избранное -->
                <div id="tab-favorites" class="modal-tab hidden">
                    <div class="modal-sticky-header">
                        <p id="fav-title-label">⭐ Избранные ответы:</p>
                    </div>
                    <div id="global-favorites-list" style="display: flex; flex-direction: column; gap: var(--app-spacing-md);"></div>
                </div>

                <!-- TAB: Органайзер -->
                <div id="tab-organizer" class="modal-tab hidden">
                    <div class="modal-sticky-header">
                        <p id="organizer-title-label">📅 Органайзер Прогресса</p>
                    </div>
                    <div id="todo-module-container" style="margin-bottom: var(--app-spacing-xl);"></div>
                    <div id="scheduler-module-container" style="margin-bottom: var(--app-spacing-xl);"></div>
                    <div id="tracker-module-container" style="margin-bottom: var(--app-spacing-xl);"></div>
                </div>
            </div>

            <!-- Нижняя часть профиля -->
            <div id="dynamic-key-area">
                <div id="sub-footer-key" class="hidden">
                    <div style="width: 100%; padding: var(--app-spacing-md); border-radius: var(--app-radius-md); background: var(--app-accent-glow); border: 1px dashed var(--app-accent-primary); color: var(--app-accent-primary); font-size: var(--app-font-size-sm); font-weight: 600; text-align: center; box-sizing: border-box;">
                        🚀 Versatile AI — Beta Version
                    </div>
                </div>
                <div id="sub-footer-context" class="hidden">
                    <div style="display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: var(--app-font-size-sm); margin-bottom: var(--app-spacing-xs);">
                        <span id="memory-label" style="color: var(--app-text-primary); display: flex; align-items: center; gap: var(--app-spacing-sm);">
                            <i data-lucide="brain" style="width: 16px; height: 16px;"></i> Память чата
                            <span onclick="window.profileUI.toggleContextHelp(event)" style="cursor: pointer; background: var(--app-bg-tertiary); width: 18px; height: 18px; border-radius: var(--app-radius-full); display: inline-flex; align-items: center; justify-content: center; font-size: var(--app-font-size-xs); color: var(--app-text-tertiary);">❓</span>
                        </span>
                        <span id="context-range-value" style="color: var(--app-accent-primary); font-weight: 700;">15</span>
                    </div>
                    <div id="context-help-text" class="hidden" style="font-size: var(--app-font-size-xs); color: var(--app-text-secondary); line-height: 1.5; text-align: left; background: var(--app-bg-tertiary); padding: var(--app-spacing-md); border-radius: var(--app-radius-md); margin-bottom: var(--app-spacing-sm); border-left: 3px solid var(--app-accent-primary);"></div>
                    <input type="range" id="context-slider" min="1" max="40" value="15" style="width: 100%; cursor: pointer; display: block;" oninput="window.profileUI.onContextSliderChange(this.value)" onchange="window.profileUI.saveContextSettings()">
                    <div style="display: flex; justify-content: space-between; font-size: var(--app-font-size-xs); color: var(--app-text-tertiary); margin-top: 2px;">
                        <span id="memory-off-label">1 (Выкл)</span>
                        <span id="memory-max-label">40 сообщений</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         TRASH MODAL (Корзина)
    ========================================== -->
    <div id="trash-modal" class="hidden">
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--app-spacing-lg); flex-shrink: 0;">
                <h3><i data-lucide="trash-2" style="width: 20px; height: 20px;"></i> Корзина</h3>
                <button onclick="window.closeTrashModal()" style="background: transparent; border: none; font-size: 22px; cursor: pointer; color: var(--app-text-tertiary); padding: 0 4px;">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="trash-list" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: var(--app-spacing-sm); padding-right: var(--app-spacing-xs); min-height: 100px;"></div>
            <p id="trash-empty" style="text-align: center; color: var(--app-text-tertiary); font-size: var(--app-font-size-sm); margin: var(--app-spacing-xl) 0; display: none;">Корзина пуста</p>
            <div id="trash-actions" style="display: none; flex-shrink: 0; margin-top: var(--app-spacing-lg); border-top: 1px solid var(--app-border-color-light); padding-top: var(--app-spacing-lg);">
                <button class="btn btn-danger" style="width: 100%; padding: var(--app-spacing-md); border-radius: var(--app-radius-md); font-size: var(--app-font-size-sm); font-weight: 600;" onclick="window.clearAllTrash()">
                    <i data-lucide="trash-2"></i> Очистить корзину полностью
                </button>
            </div>
        </div>
    </div>

    <!-- ==========================================
         GUEST SCREEN
    ========================================== -->
    <div id="guest-screen" class="hidden">
        <h1 id="error-title">Доступ ограничен</h1>
        <p id="joke-text">Проверка статуса подписки...</p>
        <a href="https://t.me" class="btn" style="text-decoration: none; display: inline-flex;">Подписаться на канал!</a>
    </div>

    <!-- ==========================================
         APP SCREEN
    ========================================== -->
    <div id="app-screen" style="display: none;">
        <div id="tags-cloud-container"></div>
        <div id="chat-container" style="display: none;"></div>
        
        <!-- FAB кнопка открытия капсулы -->
        <button id="fab-open-input" style="display: none;">
            <i data-lucide="chevron-up"></i>
        </button>
        
        <!-- Оверлей -->
        <div id="input-overlay" class="hidden"></div>
        
        <!-- Капсула ввода -->
        <div id="input-area" style="display: none;">
            <div style="position: relative; width: 100%; display: flex; align-items: flex-start;">
                <textarea id="user-input" placeholder="Ваш вопрос..." rows="1"></textarea>
                <button id="clear-input-btn" class="hidden" onclick="window.chatSend.clearUserText(event)">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="input-footer-bar">
                <div class="footer-btn-group left-group">
                    <button class="footer-action-btn media-btn" onclick="window.triggerMediaSelector()">
                        <i data-lucide="paperclip"></i>
                    </button>
                </div>
                <div class="footer-btn-group right-group">
                    <span id="voice-timer" class="hidden">15s</span>
                    <button class="footer-action-btn voice-btn" onclick="window.toggleVoiceRecording(this)">
                        <i data-lucide="mic"></i>
                    </button>
                    <button class="footer-action-btn send-btn" onclick="window.chatSend.sendMessage()">
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         SCRIPTS
    ========================================== -->
    
    <!-- Core -->
    <script src="js/core/locale.js"></script>
    <script src="js/core/config.js"></script>
    <script src="js/core/theme-manager.js"></script>

    <!-- Store -->
    <script src="js/store/ChatStore.js"></script>
    <script src="js/store/UserStore.js"></script>
    <script src="js/store/SyncStore.js"></script>
    <script src="js/store/OrganizerStore.js"></script>

    <!-- Services -->
    <script src="js/services/api.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/services/chats.js"></script>
    <script src="js/services/messages.js"></script>
    <script src="js/services/organizer.js"></script>
    <script src="js/services/sync.js"></script>

    <!-- UI -->
    <script src="js/modules/ui/renderer.js"></script>
    <script src="js/modules/ui/chat-ui.js"></script>
    <script src="js/modules/ui/organizer-ui.js"></script>
    <script src="js/modules/ui/profile-ui.js"></script>
    <script src="js/modules/ui-footer.js"></script>

    <!-- Chat -->
    <script src="js/modules/chat/send.js"></script>
    <script src="js/modules/chat/stream.js"></script>
    <script src="js/modules/chat/voice.js"></script>
    <script src="js/modules/chat/media.js"></script>

    <!-- Sync -->
    <script src="js/modules/sync/device-manager.js"></script>
    <script src="js/modules/sync/offline-handler.js"></script>
    <script src="js/modules/sync/pending-handler.js"></script>
    <script src="js/modules/sync/queue-manager.js"></script>

    <!-- Trash & Export -->
    <script src="js/modules/trash/trash-manager.js"></script>
    <script src="js/modules/export-local.js"></script>

    <!-- Utils -->
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/validators.js"></script>
    <script src="js/utils/dom.js"></script>

    <!-- Core App -->
    <script src="js/core/app.js"></script>

    <!-- Инициализация Lucide -->
    <script>
        // Инициализируем иконки после загрузки DOM
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
        
        // Также инициализируем после всех скриптов
        setTimeout(function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }, 500);
    </script>
</body>
</html>
