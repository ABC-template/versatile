name: Deploy to Vercel
on:
  push:
    branches:
      - main # Если ваша главная ветка называется master, замените main на master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Скачиваем актуальный код из репозитория GitHub
      - name: Checkout code
        uses: actions/checkout@v5

      # Шаг 2: Устанавливаем официальную консольную утилиту Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel

      # Шаг 3: Принудительно обновляем ВСЕ переменные в Vercel перед деплоем
      - name: Sync Environment Variables
        run: |
          echo "${{ secrets.BOT_TOKEN }}" | vercel env add BOT_TOKEN production --token=${{ secrets.VERCEL_TOKEN }} --force
          echo "${{ secrets.CHANNEL_ID }}" | vercel env add CHANNEL_ID production --token=${{ secrets.VERCEL_TOKEN }} --force
          echo "${{ secrets.ROUTER_KEY0 }}" | vercel env add ROUTER_KEY0 production --token=${{ secrets.VERCEL_TOKEN }} --force
          echo "${{ secrets.ROUTER_KEY1 }}" | vercel env add ROUTER_KEY1 production --token=${{ secrets.VERCEL_TOKEN }} --force
          echo "${{ secrets.ROUTER_KEY2 }}" | vercel env add ROUTER_KEY2 production --token=${{ secrets.VERCEL_TOKEN }} --force
          echo "${{ secrets.ROUTER_KEY3 }}" | vercel env add ROUTER_KEY3 production --token=${{ secrets.VERCEL_TOKEN }} --force
          echo "${{ secrets.ROUTER_KEY4 }}" | vercel env add ROUTER_KEY4 production --token=${{ secrets.VERCEL_TOKEN }} --force
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | vercel env add SUPABASE_SERVICE_ROLE_KEY production --token=${{ secrets.VERCEL_TOKEN }} --force
          echo "${{ secrets.SUPABASE_URL }}" | vercel env add SUPABASE_URL production --token=${{ secrets.VERCEL_TOKEN }} --force
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Шаг 4: Запускаем сборку проекта и отправляем её на сервера Vercel
      - name: Deploy Project to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          
